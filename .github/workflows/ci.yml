name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # Default install with ext-gd present. Used to generate raster
          # PNG fixtures in the unit tests — the package itself doesn't
          # need GD at runtime.
          - php-version: '8.4'
            extensions: 'libxml, mbstring, simplexml, gd'
            label: 'with-gd'
          # Slim production target: no GD. Raster-fixture-dependent tests
          # auto-skip via markTestSkipped; the rest must still pass. This
          # job proves the package is GD-free at runtime, which matters
          # for low-resource servers that can't load the extension.
          - php-version: '8.4'
            extensions: 'libxml, mbstring, simplexml'
            label: 'no-gd'
    name: test (${{ matrix.php-version }} ${{ matrix.label }})
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: ${{ matrix.extensions }}
          coverage: none
          tools: composer:v2

      - name: Validate composer.json
        run: composer validate --strict --no-check-publish

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Static analysis (phpstan)
        run: composer phpstan

      - name: Run tests (phpunit)
        run: composer test
